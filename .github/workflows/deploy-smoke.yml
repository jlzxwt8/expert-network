# Runs when GitHub receives a successful deployment status (e.g. Vercel GitHub integration).
# Production only: preview URLs often return 401 (Vercel Deployment Protection), so smoke would false-fail.
# Verifies the deployed site responds — does NOT log in with Google OAuth.
name: Deploy smoke

on:
  deployment_status:

jobs:
  smoke:
    # Only run on successful deploys. Vercel often labels previews as "Production" in GitHub too,
    # so we additionally require the production hostname below (not *.vercel.app preview URLs).
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deployment URL
        id: url
        env:
          ENV_URL: ${{ github.event.deployment_status.environment_url }}
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          BASE="${ENV_URL:-${TARGET_URL}}"
          if [ -z "$BASE" ]; then
            echo "No environment_url or target_url on deployment_status; skipping smoke."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Production alias for this project (not preview URLs like *-hash-team.vercel.app).
          HOST="${BASE#*://}"
          HOST="${HOST%%/*}"
          PROD_HOST="expert-network.vercel.app"
          if [ "$HOST" != "$PROD_HOST" ]; then
            echo "Host is $HOST (expected $PROD_HOST for smoke); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: GET /api/health
        if: steps.url.outputs.skip != 'true'
        run: |
          set -e
          curl -fsSL "${{ steps.url.outputs.base }}/api/health" | tee /tmp/health.json
          grep -q '"ok"' /tmp/health.json

      - name: GET /api/trpc health (public query)
        if: steps.url.outputs.skip != 'true'
        run: |
          set -e
          curl -fsSL -G "${{ steps.url.outputs.base }}/api/trpc/health" \
            --data-urlencode "batch=1" \
            --data-urlencode 'input={"0":{"json":null}}' | tee /tmp/trpc-health.json
          grep -q '"ok"' /tmp/trpc-health.json

      - name: GET /api/trpc expertsPublished (public query)
        if: steps.url.outputs.skip != 'true'
        run: |
          set -e
          curl -fsSL -G "${{ steps.url.outputs.base }}/api/trpc/expertsPublished" \
            --data-urlencode "batch=1" \
            --data-urlencode 'input={"0":{"json":{"take":1,"skip":0}}}' | tee /tmp/trpc-experts.json
          grep -q '"experts"' /tmp/trpc-experts.json

      # Liveness only (no OAuth). After infra toggles, run scripts/smoke-public-endpoints.sh on staging
      # and complete one booking + expert profile update manually — see tech-stack-improvements §3.
