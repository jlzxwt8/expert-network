# Runs when GitHub receives a successful deployment status (e.g. Vercel GitHub integration).
# Production only: preview URLs often return 401 (Vercel Deployment Protection), so smoke would false-fail.
# Verifies the deployed site responds — does NOT log in with Google OAuth.
name: Deploy smoke

on:
  deployment_status:

jobs:
  smoke:
    # Only run on successful production deploys; skip previews and other environments.
    # Vercel typically sends "Production"; GitHub's API default name is "production".
    if: >-
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment.environment == 'Production' ||
       github.event.deployment.environment == 'production')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deployment URL
        id: url
        env:
          ENV_URL: ${{ github.event.deployment_status.environment_url }}
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          BASE="${ENV_URL:-${TARGET_URL}}"
          if [ -z "$BASE" ]; then
            echo "No environment_url or target_url on deployment_status; skipping smoke."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: GET /api/health
        if: steps.url.outputs.skip != 'true'
        run: |
          set -e
          curl -fsSL "${{ steps.url.outputs.base }}/api/health" | tee /tmp/health.json
          grep -q '"ok"' /tmp/health.json

      # This workflow only checks liveness (no OAuth / E2E).
