# Reports production dependency advisories for the root Next.js app (does not fail the build).
# WeChat tooling and its transitive tree live under wechat/ — run `cd wechat && npm audit` separately.
name: npm audit (report)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Production audit (informational)
        run: |
          npm run audit:triage || true
          echo "Tip: npm run audit:fix locally when safe; eas-sdk/hardhat chain may stay open until upstream releases."
      - name: Upload production audit JSON
        if: always()
        run: npm audit --omit=dev --json > audit-production.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-production-json
          path: audit-production.json
