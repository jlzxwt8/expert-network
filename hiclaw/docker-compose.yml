version: "3.8"

services:
  # HiClaw Manager — pre-built image from alibaba/hiclaw
  # The install script configures Matrix, Higress, MinIO, Element Web internally.
  # On first run, use the interactive installer instead:
  #   bash <(curl -sSL https://higress.ai/hiclaw/install.sh)
  # This compose file is for subsequent starts + the custom service.

  expert-shadow-service:
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: expert-shadow-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - TIDB_DATABASE_URL=${TIDB_DATABASE_URL}
      - HICLAW_POSTGRES_URL=${HICLAW_POSTGRES_URL}
      - DB9_DATABASE_URL=${DB9_DATABASE_URL}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MEM9_ENABLED=${MEM9_ENABLED:-true}
      - EVALUATOR_ENABLED=${EVALUATOR_ENABLED:-true}
      - EVALUATOR_MIN_SCORE=${EVALUATOR_MIN_SCORE:-7}
      - EVALUATOR_MAX_ROUNDS=${EVALUATOR_MAX_ROUNDS:-3}
    networks:
      - hiclaw-net

networks:
  hiclaw-net:
    external: true
    name: hiclaw_default
